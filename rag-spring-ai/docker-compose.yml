version: '3.8'

services:
  # ChromaDB - Vector Store
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # Spring AI RAG Backend
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8080:8080"
    environment:
      - CHROMA_URL=http://chromadb:8000
      - CHROMA_COLLECTION=rag-documents
      - CORS_ORIGINS=http://localhost:3000,http://rag-ui:3000
      - JAVA_OPTS=-Xms1g -Xmx4g
    deploy:
      resources:
        limits:
          memory: 5G
    depends_on:
      - chromadb

  # Next.js UI
  rag-ui:
    build:
      context: ../rag-next-ui
      dockerfile: Dockerfile
    container_name: rag-ui
    ports:
      - "3000:3000"
    environment:
      - RAG_API_URL=http://rag-api:8080
    depends_on:
      - rag-api

volumes:
  chroma_data:
