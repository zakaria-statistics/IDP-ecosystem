global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot RAG API
  - job_name: 'rag-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['rag-api:8080']
    scrape_interval: 5s
