version: '3.8'

# Development compose - only runs ChromaDB
# Use this when developing Spring Boot app locally

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb-dev
    ports:
      - "8000:8000"
    volumes:
      - chroma_dev_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  chroma_dev_data:
