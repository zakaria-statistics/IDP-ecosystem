# Production compose for OVH VM deployment
# Place this at /opt/rag-app/docker-compose.yml on the VM

version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rag-network

  rag-api:
    image: ghcr.io/we-are-beebay/rag-spring-ai:main
    container_name: rag-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CHROMA_URL=http://chromadb:8000
      - CHROMA_COLLECTION=rag-documents
      - CORS_ORIGINS=http://localhost:3000,https://your-domain.com
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - rag-network

  rag-ui:
    image: ghcr.io/we-are-beebay/rag-next-ui:main
    container_name: rag-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - RAG_API_URL=http://rag-api:8080
    depends_on:
      - rag-api
    networks:
      - rag-network

volumes:
  chroma_data:

networks:
  rag-network:
    driver: bridge
